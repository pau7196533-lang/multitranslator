services:
  - type: web
    name: prismtalk-realtime
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: FRONTEND_BASE_URL
        value: https://mulittranslator.netlify.app
      - key: CORS_ORIGIN
        value: https://mulittranslator.netlify.app
      - key: HTTPS
        value: "false"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: GOOGLE_SPEECH_API_KEY
        sync: false
